network_policies:
  huggingface:
    name: huggingface
    endpoints:
      - host: huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: cdn-lfs.huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /opt/hermes/.venv/bin/python3 }
