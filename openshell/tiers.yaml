# Policy tier definitions for HermesShell onboard wizard.
# Each tier specifies which presets are enabled by default.

tiers:
  restricted:
    description: "Base sandbox only. No third-party network access beyond inference."
    presets: []

  balanced:
    description: "Full dev tooling and web search. No messaging platform access."
    presets:
      - npm
      - pypi
      - huggingface
      - brave
      - github

  open:
    description: "Broad access across third-party services including messaging."
    presets:
      - npm
      - pypi
      - huggingface
      - brave
      - github
      - slack
      - discord
      - telegram
