version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /etc/ssl
    - /etc/openshell-tls
    - /etc/resolv.conf
    - /etc/passwd
    - /etc/group
    - /opt/hermes
    - /opt/nvm
    - /opt/mcp-atlassian
    - /dev/urandom
    - /sandbox/knowledge
    - /sandbox/configs
  read_write:
    - /opt/data
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  inference_local:
    name: inference_local
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference.local
        port: 80
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /opt/hermes/.venv/bin/python3 }
